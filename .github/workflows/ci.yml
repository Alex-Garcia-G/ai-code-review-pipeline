name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check for syntax errors
        run: node --check src/server.js src/orchestrator.js src/agents/planner.js src/agents/reviewer.js src/agents/security.js src/agents/synthesizer.js

      - name: Run tests
        run: npm test
